<!DOCTYPE html>
<html>
<head>
<title>RenderRack Marketplace</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
}

header{
background:#020617;
padding:20px;
}

h1{
margin:0;
}

.topbar{
margin:20px;
}

input{
padding:10px;
width:250px;
border-radius:6px;
border:none;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.card{
background:#1e293b;
padding:15px;
margin:10px;
width:220px;
border-radius:10px;
}

.card img{
width:100%;
border-radius:8px;
}

button{
background:#22c55e;
border:none;
padding:8px 14px;
border-radius:6px;
color:white;
cursor:pointer;
}

.admin-link{
color:#38bdf8;
}

</style>
</head>

<body>

<header>
<h1>RenderRack Hardware Marketplace</h1>
<p>Buy & Sell PC Components</p>
<a class="admin-link" href="admin.html">Admin Panel</a>
</header>

<div class="topbar">
<input type="text" id="search" placeholder="Search components...">
</div>

<div class="products" id="products"></div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || []

let container = document.getElementById("products")

function showProducts(list){

container.innerHTML=""

list.forEach(p => {

container.innerHTML += `
<div class="card">

<img src="${p.image}">

<h3>${p.name}</h3>

<p><b>₹ ${p.price}</b></p>

<p>${p.category}</p>

<p>${p.condition}</p>

<a href="${p.contact}" target="_blank">
<button>Contact Seller</button>
</a>

</div>
`

})

}

showProducts(products)

document.getElementById("search").addEventListener("input", function(){

let value = this.value.toLowerCase()

let filtered = products.filter(p =>
p.name.toLowerCase().includes(value)
)

showProducts(filtered)

})

</script>

</body>
</html>
