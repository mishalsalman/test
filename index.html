<!DOCTYPE html>
<html>
<head>
<title>RenderRack Store</title>
<style>

body{
font-family: Arial;
background:#111;
color:white;
text-align:center;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:#1c1c1c;
padding:20px;
margin:10px;
border-radius:10px;
width:200px;
}

img{
width:100%;
}

button{
padding:8px;
background:#00bcd4;
border:none;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<h1>RenderRack PC Parts</h1>

<a href="admin.html">Admin Panel</a>

<div class="products" id="products"></div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || []

let container = document.getElementById("products")

products.forEach(p => {

container.innerHTML += `
<div class="card">
<img src="${p.image}">
<h3>${p.name}</h3>
<p>${p.price}</p>
<p>${p.condition}</p>
<a href="${p.contact}" target="_blank">
<button>Contact</button>
</a>
</div>
`

})

</script>

</body>
</html>
